<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Préparation Examen Civique</title>
  <link rel="stylesheet" href="2. style.css"> <!-- Attention au nom du fichier sur votre GitHub -->
</head>
<body>

  <div class="quiz-container">
    <h1>🇫🇷 Entraînement Examen Civique</h1>

    <div id="info">
      <div class="stat-box">⏱ Temps : <span id="timer">60</span>s</div>
      <div class="stat-box">🧮 Score : <span id="score">0</span></div>
    </div>

    <div id="quiz-box" style="display: none;">
      <div id="progress">Question 1/3</div>
      <h2 id="question"></h2>
      <div id="answers"></div>
      <div id="feedback" class="feedback-box" style="display: none;"></div>
      <button id="next-btn" style="display: none;" onclick="nextQuestion()">Question suivante ➡️</button>
    </div>

    <button id="start-btn" onclick="startExam()">Commencer l'examen</button>
  </div>

  <script src="3. script.js"></script> <!-- Attention au nom du fichier sur votre GitHub -->
</body>
</html>
